<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}DataTap{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0a0b;
        --surface: #111114;
        --surface2: #18181d;
        --border: #2a2a32;
        --accent: #00e5a0;
        --accent-dim: #00e5a020;
        --red: #ff4d6d;
        --yellow: #ffd166;
        --text: #e8e8f0;
        --muted: #6b6b80;
        --mono: "JetBrains Mono", monospace;
        --display: "Syne", sans-serif;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--mono);
        font-size: 13px;
        line-height: 1.6;
        min-height: 100vh;
      }

      /* Subtle grid background */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(var(--border) 1px, transparent 1px),
          linear-gradient(90deg, var(--border) 1px, transparent 1px);
        background-size: 40px 40px;
        opacity: 0.15;
        pointer-events: none;
        z-index: 0;
      }

      .layout {
        position: relative;
        z-index: 1;
        display: flex;
        min-height: 100vh;
      }

      /* Sidebar */
      .sidebar {
        width: 220px;
        min-height: 100vh;
        border-right: 1px solid var(--border);
        background: var(--surface);
        padding: 24px 0;
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
      }

      .logo {
        font-family: var(--display);
        font-weight: 800;
        font-size: 20px;
        letter-spacing: -0.5px;
        padding: 0 24px 24px;
        border-bottom: 1px solid var(--border);
        color: var(--accent);
      }
      .logo span {
        color: var(--text);
      }

      .nav {
        padding: 16px 0;
        flex: 1;
      }
      .nav a {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 24px;
        color: var(--muted);
        text-decoration: none;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.03em;
        transition:
          color 0.15s,
          background 0.15s;
      }
      .nav a:hover,
      .nav a.active {
        color: var(--text);
        background: var(--accent-dim);
      }
      .nav a.active {
        border-left: 2px solid var(--accent);
      }
      .nav-icon {
        font-size: 14px;
        width: 16px;
        text-align: center;
      }

      .sidebar-footer {
        padding: 16px 24px;
        border-top: 1px solid var(--border);
        color: var(--muted);
        font-size: 11px;
      }

      /* Main */
      .main {
        flex: 1;
        padding: 32px 40px;
        overflow-x: hidden;
      }

      .page-header {
        margin-bottom: 32px;
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 16px;
      }
      .page-title {
        font-family: var(--display);
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -1px;
        color: var(--text);
      }
      .page-subtitle {
        color: var(--muted);
        margin-top: 4px;
        font-size: 12px;
      }

      /* Cards */
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 20px 24px;
      }
      .card-title {
        font-family: var(--display);
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 16px;
      }

      /* Buttons */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 7px 14px;
        border-radius: 4px;
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.05em;
        cursor: pointer;
        border: none;
        text-decoration: none;
        transition: all 0.15s;
      }
      .btn-primary {
        background: var(--accent);
        color: #000;
      }
      .btn-primary:hover {
        background: #00ffb3;
      }
      .btn-ghost {
        background: transparent;
        color: var(--muted);
        border: 1px solid var(--border);
      }
      .btn-ghost:hover {
        color: var(--text);
        border-color: var(--muted);
      }
      .btn-danger {
        background: transparent;
        color: var(--red);
        border: 1px solid var(--red) 33;
      }
      .btn-danger:hover {
        background: var(--red) 15;
      }

      /* Badges */
      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 3px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .badge-green {
        background: var(--accent) 20;
        color: var(--accent);
      }
      .badge-red {
        background: var(--red) 20;
        color: var(--red);
      }
      .badge-yellow {
        background: var(--yellow) 20;
        color: var(--yellow);
      }
      .badge-muted {
        background: var(--border);
        color: var(--muted);
      }

      /* Table */
      .data-table {
        width: 100%;
        border-collapse: collapse;
      }
      .data-table th {
        text-align: left;
        padding: 10px 12px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
        border-bottom: 1px solid var(--border);
      }
      .data-table td {
        padding: 11px 12px;
        border-bottom: 1px solid var(--border) 88;
        color: var(--text);
        font-size: 12px;
      }
      .data-table tr:last-child td {
        border-bottom: none;
      }
      .data-table tr:hover td {
        background: var(--surface2);
      }
      .data-table .mono {
        font-family: var(--mono);
      }

      /* Stat blocks */
      .stats-row {
        display: flex;
        gap: 16px;
        margin-bottom: 24px;
      }
      .stat-box {
        flex: 1;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 16px 20px;
      }
      .stat-label {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 6px;
      }
      .stat-value {
        font-family: var(--display);
        font-size: 28px;
        font-weight: 800;
        color: var(--text);
      }
      .stat-value.accent {
        color: var(--accent);
      }

      /* Toast */
      #toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 12px 18px;
        font-size: 12px;
        z-index: 1000;
        display: none;
        animation: slideIn 0.2s ease;
      }
      #toast.show {
        display: block;
      }
      #toast.success {
        border-color: var(--accent) 60;
        color: var(--accent);
      }
      #toast.error {
        border-color: var(--red) 60;
        color: var(--red);
      }
      @keyframes slideIn {
        from {
          transform: translateY(8px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      /* Misc */
      .empty-state {
        text-align: center;
        padding: 48px 24px;
        color: var(--muted);
      }
      .empty-state .icon {
        font-size: 32px;
        margin-bottom: 12px;
      }
      .divider {
        height: 1px;
        background: var(--border);
        margin: 24px 0;
      }
      code {
        font-family: var(--mono);
        background: var(--surface2);
        padding: 2px 6px;
        border-radius: 3px;
        font-size: 11px;
      }
      textarea,
      input[type="text"],
      input[type="url"] {
        width: 100%;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 4px;
        color: var(--text);
        font-family: var(--mono);
        font-size: 12px;
        padding: 10px 12px;
        outline: none;
        transition: border-color 0.15s;
      }
      textarea:focus,
      input:focus {
        border-color: var(--accent) 60;
      }
      label {
        display: block;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 6px;
      }

      .spinner {
        width: 14px;
        height: 14px;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        display: inline-block;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    {% block head %}{% endblock %}
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="logo">Data<span>Tap</span></div>
        <nav class="nav">
          <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">
            <span class="nav-icon">⬡</span> Dashboard
          </a>
          <a
            href="/add"
            class="{% if request.url.path == '/add' %}active{% endif %}"
          >
            <span class="nav-icon">+</span> Add Source
          </a>
        </nav>
        <div class="sidebar-footer">v0.1.0 · SQLite</div>
      </aside>

      <main class="main">{% block content %}{% endblock %}</main>
    </div>

    <div id="toast"></div>

    <script>
      function toast(msg, type = "success") {
        const el = document.getElementById("toast");
        el.textContent = msg;
        el.className = "show " + type;
        setTimeout(() => (el.className = ""), 3000);
      }
    </script>
    {% block scripts %}{% endblock %}
  </body>
</html>
